# Opcional: solo si NO queres usar el PostgreSQL local instalado en
# D:\Archivos de programa\PostgreSQL\18 (puerto 5432).
# Este compose levanta un Postgres en el puerto 5433 para no chocar con el local.
services:
  postgres:
    image: postgres:18-alpine
    container_name: erp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "12345"
      POSTGRES_DB: erp_electrodomesticos
    ports:
      - "5433:5432"
    volumes:
      - erp_pgdata:/var/lib/postgresql/data

volumes:
  erp_pgdata:
